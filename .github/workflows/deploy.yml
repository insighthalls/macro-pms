name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend - deploy to Vercel (hook)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy hook
        env:
          VERCEL_DEPLOY_HOOK_BACKEND: ${{ secrets.VERCEL_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_BACKEND" ]; then
            echo "VERCEL_DEPLOY_HOOK_BACKEND not set; failing."
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$VERCEL_DEPLOY_HOOK_BACKEND"

  frontend:
    name: Frontend - deploy to Vercel (hook)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frontend deploy hook
        env:
          VERCEL_DEPLOY_HOOK_FRONTEND: ${{ secrets.VERCEL_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_FRONTEND" ]; then
            echo "VERCEL_DEPLOY_HOOK_FRONTEND not set; failing."
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$VERCEL_DEPLOY_HOOK_FRONTEND"
