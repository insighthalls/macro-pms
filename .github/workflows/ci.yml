name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend · typecheck + test + build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: macro
          POSTGRES_PASSWORD: macro
          POSTGRES_DB: macro_pms
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://macro:macro@localhost:5432/macro_pms?schema=public
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_ACCESS_TTL_MIN: 30
      JWT_REFRESH_TTL_DAYS: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend-slice/package-lock.json }
      - run: npm ci
        working-directory: backend-slice
      - run: npx prisma generate
        working-directory: backend-slice
      - run: npx prisma migrate deploy
        working-directory: backend-slice
      - run: npm run build
        working-directory: backend-slice
      - run: npm test
        working-directory: backend-slice

  frontend:
    name: Frontend · typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          # BACKEND_URL is the server-side env var read by next.config.mjs rewrites.
          # A placeholder is fine for the CI build — rewrites are evaluated at runtime.
          BACKEND_URL: https://api.example.org
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
